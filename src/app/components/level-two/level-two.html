<div class="container py-5 d-flex flex-column align-items-center justify-content-center min-vh-100">
  
  <div class="w-100 style-max-width mb-4">
    <button routerLink="/dashboard" class="btn btn-link p-0 text-muted text-decoration-none">
      <i class="bi bi-chevron-left"></i> Volver al Dashboard
    </button>
  </div>

  <div class="card p-5 border-0 shadow-sm text-center mb-4 w-100 style-max-width flashcard-main-card">
    <span class="badge bg-light text-secondary rounded-pill mb-3 align-self-center px-3 py-2 text-uppercase font-tracking">
      Nivel 2: Escritura activa
    </span>
    
    <h1 class="display-3 fw-bold my-4 text-dark font-korean">{{ tarjetaActual.coreano }}</h1>
    <p class="text-muted fst-italic mb-2">Escribe la traducción al Español</p>
  </div>

  <div class="w-100 style-max-width">
    <div class="card p-4 border-0 shadow-sm bg-white">
      <div class="mb-3">
        <input type="text" 
               [(ngModel)]="respuestaUsuario" 
               [disabled]="respondido"
               (keyup.enter)="verificarEscritura()"
               class="form-control form-custom-input text-center py-3 fs-5" 
               placeholder="Escribe tu respuesta aquí...">
      </div>
      
      @if (!respondido) {
        <button (click)="verificarEscritura()" class="btn btn-primary w-100 py-2.5 rounded-pill shadow-sm fw-semibold">
          Verificar Respuesta
        </button>
      }
    </div>
  </div>

  @if (mensaje) {
    <div class="mt-4 text-center">
      <p class="fw-bold fs-5 mb-3" [ngClass]="mensaje.includes('Correcto') ? 'text-success' : 'text-danger'">
        {{ mensaje }}
      </p>
      <button (click)="cargarNuevaTarjeta()" class="btn btn-dark rounded-pill px-5 shadow">
        Siguiente Tarjeta
      </button>
    </div>
  }

</div>
